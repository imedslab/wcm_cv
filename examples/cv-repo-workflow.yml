# ── Drop-in CV builder for YOUR data repo ───────────────────────────────────
# Copy this file to .github/workflows/cv.yml in a repo that contains only your
# cv_data/ folder. It PULLS the prebuilt cvkit image (no LaTeX, no Python, no
# build) and publishes the PDF. Edit cv_data/, push, done.
#
# The freshest PDF is always at:
#   https://github.com/<you>/<repo>/releases/latest/download/cv.pdf
name: Build CV

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # to publish the PDF as a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile CV
        run: |
          mkdir -p out
          docker run --rm \
            -v "$PWD/cv_data:/data" \
            -v "$PWD/out:/out" \
            ghcr.io/imedslab/cvkit:latest
      - name: Publish to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          files: out/cv.pdf
