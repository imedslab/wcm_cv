# ── Drop-in CV builder for YOUR data repo ───────────────────────────────────
# Copy this file to .github/workflows/cv.yml in a (private) repo that contains
# only your cv_data/ folder. It PULLS the prebuilt, public cvkit image (no
# LaTeX, no Python, no build), compiles your CV, and publishes the PDF.
# Edit cv_data/, push, done.
#
# The freshest PDF is always at:
#   https://github.com/<you>/<repo>/releases/latest/download/cv.pdf
#
# OPTIONAL — support the project: add a repo secret CVKIT_STAR_TOKEN (a classic
# GitHub PAT with the `public_repo` scope) and each build stars imedslab/wcm_cv,
# letting its author gauge usage. Skipped automatically if the secret is unset.
# Note: GitHub stars are public, so this reveals that your account uses cvkit.
name: Build CV

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # to publish the PDF as a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile CV
        run: |
          mkdir -p out
          docker run --rm \
            -v "$PWD/cv_data:/data" \
            -v "$PWD/out:/out" \
            ghcr.io/imedslab/cvkit:latest
      - name: Publish to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          files: out/cv.pdf
      - name: Star cvkit (optional usage ping)
        env:
          STAR_TOKEN: ${{ secrets.CVKIT_STAR_TOKEN }}
        run: |
          if [ -z "$STAR_TOKEN" ]; then
            echo "CVKIT_STAR_TOKEN not set — skipping star."
            exit 0
          fi
          curl -sS -o /dev/null -w 'star -> HTTP %{http_code}\n' -X PUT \
            -H "Authorization: Bearer $STAR_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Length: 0" \
            https://api.github.com/user/starred/imedslab/wcm_cv
