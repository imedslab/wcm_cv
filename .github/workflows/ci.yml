name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Pure-Python unit tests, no TeX needed.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -m "not integration"

  # Build the image, prove it compiles the demo CV, and publish it to GHCR
  # (only on the default branch) so data repos can just pull and run it.
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cvkit .
      - name: Smoke-test — compile the demo CV with the fresh image
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/cv_data:/data" -v "$PWD/out:/out" cvkit
          test -f out/cv.pdf
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          image="ghcr.io/${{ github.repository_owner }}/cvkit"
          docker tag cvkit "$image:latest"
          docker push "$image:latest"
